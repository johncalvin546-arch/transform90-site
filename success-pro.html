<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    
    <title>Pro Unlocked | Elevate90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { heading: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] }, colors: { brand: { 400: '#a3e635', 500: '#84cc16' }, dark: { 950: '#09090b', 900: '#18181b', 800: '#27272a' } } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .font-heading { font-family: 'Manrope', sans-serif; }
        .glass-panel { background: linear-gradient(145deg, rgba(39, 39, 42, 0.6) 0%, rgba(24, 24, 27, 0.9) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(163, 230, 53, 0.15); }
        .box-glow-strong { box-shadow: 0 0 50px rgba(163, 230, 53, 0.25); }
        .text-glow { text-shadow: 0 0 20px rgba(163, 230, 53, 0.5); }
        @keyframes modalEnter { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-enter { animation: modalEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden antialiased p-4">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-brand-500/10 via-dark-950 to-dark-950 z-0"></div>

    <main class="w-full max-w-lg relative z-10 animate-enter">
        <div class="glass-panel rounded-[2rem] p-8 md:p-10 box-glow-strong relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand-400 to-transparent opacity-50"></div>

            <div class="flex items-center justify-between mb-8 pb-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-brand-500"></span></span>
                    <span class="text-sm font-bold text-white uppercase tracking-widest text-glow">System Active</span>
                </div>
                <div class="text-xs font-bold bg-brand-400 text-black px-3 py-1.5 rounded-md uppercase tracking-wider shadow-[0_0_15px_rgba(163,230,53,0.4)]">Pro Tier</div>
            </div>

            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-brand-400 text-black rounded-full flex items-center justify-center mx-auto mb-5 shadow-[0_0_25px_rgba(163,230,53,0.5)]">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h1 class="text-3xl font-heading font-extrabold text-white mb-2 tracking-tight">Access Granted</h1>
                <p class="text-zinc-400 text-sm font-medium">Payment successful. Pro package unlocked.</p>
            </div>

            <div class="space-y-4">
                <a href="[PRO_DASHBOARD_LINK]" class="w-full flex items-center justify-center gap-3 bg-brand-400 hover:bg-brand-500 text-black px-6 py-5 rounded-xl font-extrabold text-lg transition-all hover:scale-[1.02] shadow-[0_0_30px_rgba(163,230,53,0.4)]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Start Today's Workout
                </a>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <a href="[PRO_DASHBOARD_LINK]" class="flex flex-col items-center justify-center gap-2 bg-dark-800/80 hover:bg-dark-700 border border-white/5 hover:border-brand-400/30 text-white p-4 rounded-xl font-bold transition-all text-sm">
                        <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg> Open Dashboard
                    </a>
                    <a href="[PRO_TRACKER_LINK]" class="flex flex-col items-center justify-center gap-2 bg-dark-800/80 hover:bg-dark-700 border border-white/5 hover:border-brand-400/30 text-white p-4 rounded-xl font-bold transition-all text-sm">
                        <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg> Open Tracker
                    </a>
                </div>
                
                <a href="[PRO_DRIVE_LINK]" class="w-full flex items-center justify-between bg-dark-800/80 hover:bg-dark-700 border border-white/5 hover:border-brand-400/30 text-white px-6 py-4 rounded-xl font-bold transition-all mt-2">
                    <span class="flex items-center gap-3"><svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Download Package</span>
                </a>
            </div>
            <div class="mt-8 text-center text-xs text-zinc-500 font-medium">Your dashboard is ready. Save this link.</div>
        </div>
    </main>
</body>
</html>
