<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | ELEVATE90</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans selection:bg-lime-400 selection:text-gray-900">

    <div class="glass-panel max-w-md w-full rounded-2xl p-8 md:p-10 shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 tracking-tight">Welcome Back</h1>
        <p class="text-gray-400 mb-8">Enter your credentials to execute.</p>

        <div id="error-msg" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 text-red-400 rounded-lg text-sm"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                <input
                    type="email"
                    id="email"
                    required
                    class="glass-input w-full px-4 py-3 rounded-xl focus:ring-0"
                    placeholder="you@example.com"
                />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    required
                    class="glass-input w-full px-4 py-3 rounded-xl focus:ring-0"
                    placeholder="Enter your password"
                />
            </div>

            <button
                type="submit"
                id="submit-btn"
                class="w-full bg-lime-400 text-gray-950 font-bold py-4 rounded-xl hover:bg-lime-500 transition-all text-lg shadow-[0_0_15px_rgba(163,230,53,0.3)]"
            >
                Sign In →
            </button>
        </form>

        <p class="mt-6 text-center text-gray-400 text-sm">
            Don’t have an account?
            <a href="signup.html" class="text-lime-400 hover:text-lime-300">Create one</a>
        </p>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession(false, true);

            const form = document.getElementById('login-form');
            if (form) {
                form.addEventListener('submit', handleLogin);
            }
        });
    </script>
</body>
</html>
