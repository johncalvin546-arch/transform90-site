<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    
    <title>Progress Hub | ELEVATE90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#a3e635', dark: '#09090b', panel: '#18181b' }, fontFamily: { heading: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .box-glow { box-shadow: 0 0 30px rgba(163, 230, 53, 0.1); }
        .input-field { background: #09090b; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.75rem 1rem; border-radius: 0.5rem; width: 100%; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: #a3e635; }
        /* Simple Bar Chart CSS */
        .chart-container { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding-top: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chart-bar { background: #a3e635; width: 100%; border-radius: 4px 4px 0 0; min-width: 20px; transition: height 0.5s ease; position: relative; }
        .chart-bar span { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="w-full z-50 glass-panel border-b border-white/5">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="javascript:history.back()" class="text-sm font-bold text-zinc-400 hover:text-white">← Back</a>
            <div class="text-lg font-heading font-bold text-white">Progress <span class="text-brand">Hub</span></div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto w-full px-6 py-10 space-y-8 relative">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="md:col-span-1 glass-panel rounded-3xl p-6 h-fit box-glow">
                <h2 class="text-xl font-heading font-bold text-white mb-6">Weekly Check-in</h2>
                <form id="progress-form" class="space-y-4">
                    <div><label class="block text-xs font-bold text-zinc-400 mb-1 uppercase">Weight (kg)</label><input type="number" step="0.1" id="weight" class="input-field" required></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1 uppercase">Waist (cm)</label><input type="number" step="0.1" id="waist" class="input-field"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1 uppercase">Chest (cm)</label><input type="number" step="0.1" id="chest" class="input-field"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1 uppercase">Energy (1-10)</label><input type="number" min="1" max="10" id="energy" class="input-field"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1 uppercase">Sleep (1-10)</label><input type="number" min="1" max="10" id="sleep" class="input-field"></div>
                    </div>
                    <button type="submit" class="w-full bg-brand hover:bg-[#84cc16] text-black font-extrabold py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(163,230,53,0.3)] mt-2">Log Progress</button>
                </form>
            </div>

            <div class="md:col-span-2 space-y-8">
                <div class="glass-panel rounded-3xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-heading font-bold text-white">Weight Trend</h2>
                        <span id="status-badge" class="bg-dark border border-white/10 text-xs font-bold px-3 py-1 rounded-full text-zinc-400">Needs Data</span>
                    </div>
                    <div id="chart" class="chart-container"></div>
                </div>

                <div class="glass-panel rounded-3xl p-6 overflow-hidden">
                    <h2 class="text-lg font-heading font-bold text-white mb-4">History Log</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="text-xs uppercase bg-dark/50 text-zinc-400">
                                <tr><th class="px-4 py-3 rounded-tl-lg">Week</th><th class="px-4 py-3">Weight</th><th class="px-4 py-3">Waist</th><th class="px-4 py-3 rounded-tr-lg">Energy</th></tr>
                            </thead>
                            <tbody id="history-body" class="divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let history = JSON.parse(localStorage.getItem('elevateProgress')) || [];

        document.getElementById('progress-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const entry = {
                id: history.length + 1,
                weight: parseFloat(document.getElementById('weight').value),
                waist: document.getElementById('waist').value || '-',
                chest: document.getElementById('chest').value || '-',
                energy: document.getElementById('energy').value || '-',
                sleep: document.getElementById('sleep').value || '-'
            };
            history.push(entry);
            localStorage.setItem('elevateProgress', JSON.stringify(history));
            document.getElementById('progress-form').reset();
            render();
        });

        function render() {
            const tbody = document.getElementById('history-body');
            const chart = document.getElementById('chart');
            const status = document.getElementById('status-badge');
            
            tbody.innerHTML = '';
            chart.innerHTML = '';

            if(history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-4 text-center text-zinc-500">No data logged yet.</td></tr>';
                return;
            }

            // Render Table (Reversed so newest is top)
            [...history].reverse().forEach(entry => {
                tbody.innerHTML += `
                    <tr class="hover:bg-dark/30 transition-colors">
                        <td class="px-4 py-3 font-bold text-white">W${entry.id}</td>
                        <td class="px-4 py-3 text-brand font-bold">${entry.weight}kg</td>
                        <td class="px-4 py-3 text-zinc-300">${entry.waist}</td>
                        <td class="px-4 py-3 text-zinc-300">${entry.energy}/10</td>
                    </tr>
                `;
            });

            // Render Simple Bar Chart
            const weights = history.map(h => h.weight);
            const minWeight = Math.min(...weights) - 2; // Baseline
            const maxWeight = Math.max(...weights);
            const range = (maxWeight - minWeight) || 1; // avoid /0

            history.forEach(entry => {
                const heightPercent = Math.max(((entry.weight - minWeight) / range) * 100, 10); // Min 10% height
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = `${heightPercent}%`;
                bar.innerHTML = `<span class="text-zinc-300">${entry.weight}</span>`;
                chart.appendChild(bar);
            });

            // Status Logic
            if(history.length > 1) {
                const first = history[0].weight;
                const last = history[history.length-1].weight;
                if(last < first) {
                    status.innerText = 'On Track (Trending Down)';
                    status.className = 'bg-brand/10 border border-brand/30 text-xs font-bold px-3 py-1 rounded-full text-brand';
                } else if(last > first) {
                    status.innerText = 'Needs Adjustment';
                    status.className = 'bg-red-500/10 border border-red-500/30 text-xs font-bold px-3 py-1 rounded-full text-red-400';
                }
            } else {
                status.innerText = 'Baseline Set';
                status.className = 'bg-blue-500/10 border border-blue-500/30 text-xs font-bold px-3 py-1 rounded-full text-blue-400';
            }
        }

        render();
    </script>
</body>
</html>
