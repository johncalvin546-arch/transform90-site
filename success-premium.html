        .glass-panel { background: linear-gradient(145deg, rgba(20, 20, 22, 0.8) 0%, rgba(9, 9, 11, 0.95) 100%); backdrop-filter: blur(24px); border: 1px solid rgba(163, 230, 53, 0.3); }
