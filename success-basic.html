<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Granted | Basic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { heading: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] }, colors: { brand: { 400: '#a3e635', 500: '#84cc16' }, dark: { 950: '#09090b', 900: '#18181b', 800: '#27272a' } } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .font-heading { font-family: 'Manrope', sans-serif; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .box-glow { box-shadow: 0 0 40px rgba(163, 230, 53, 0.15); }
        @keyframes modalEnter { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-enter { animation: modalEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
    
    <!-- Vercel Speed Insights -->
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden antialiased p-4">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-brand-500/10 blur-[120px] rounded-full z-0"></div>

    <main class="w-full max-w-lg relative z-10 animate-enter">
        <div class="glass-panel rounded-[2rem] p-8 md:p-10 box-glow relative overflow-hidden">
            <div class="flex items-center justify-between mb-8 pb-6 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-brand-500"></span></span>
                    <span class="text-sm font-bold text-zinc-300 uppercase tracking-widest">System Active</span>
                </div>
                <div class="text-xs font-bold bg-white/10 text-white px-3 py-1.5 rounded-md uppercase tracking-wider">Basic Tier</div>
            </div>

            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-brand-400/20 text-brand-400 rounded-full flex items-center justify-center mx-auto mb-5 border border-brand-400/30">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-3xl font-heading font-extrabold text-white mb-2 tracking-tight">Access Granted</h1>
                <p class="text-zinc-400 text-sm font-medium">Payment successful. Basic package unlocked.</p>
            </div>

            <div class="space-y-4">
                <a href="[BASIC_DASHBOARD_LINK]" class="w-full flex items-center justify-between bg-brand-400 hover:bg-brand-500 text-black px-6 py-4 rounded-xl font-extrabold transition-all hover:scale-[1.02] shadow-[0_0_20px_rgba(163,230,53,0.3)]">
                    <span class="flex items-center gap-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg> Open Dashboard</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
                <a href="[BASIC_TRACKER_LINK]" class="w-full flex items-center gap-3 bg-dark-800 hover:bg-dark-700 border border-white/5 text-white px-6 py-4 rounded-xl font-bold transition-all"><svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg> Open Tracker</a>
                <a href="[BASIC_DRIVE_LINK]" class="w-full flex items-center gap-3 bg-dark-800 hover:bg-dark-700 border border-white/5 text-white px-6 py-4 rounded-xl font-bold transition-all"><svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Download Package</a>
            </div>
            <div class="mt-8 text-center text-xs text-zinc-500 font-medium">Bookmark this page for quick access.</div>
        </div>
    </main>
</body>
</html>
